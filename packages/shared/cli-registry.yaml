version: "1.0"
clis:
  claude:
    name: Claude Code
    package: "@anthropic-ai/claude-code"
    npm_link: https://www.npmjs.com/package/@anthropic-ai
    version: 2.1.121
    install: npm install -g @anthropic-ai/claude-code
    models:
      sonnet:
        id: sonnet
        label: Sonnet
        default: true
      opus:
        id: opus
        label: Opus
      haiku:
        id: haiku
        label: Haiku
  codex:
    name: Codex CLI
    package: "@openai/codex"
    npm_link: https://www.npmjs.com/package/@openai/codex
    version: 0.125.0
    install: npm install -g @openai/codex
    models:
      gpt_5_4:
        id: gpt-5.4
        label: GPT-5.4 — Frontier model for complex coding, research, and real-world
          work.
        default: true
        reasoning_efforts:
          - low
          - medium
          - high
          - xhigh
        default_reasoning_effort: xhigh
      gpt_5_3_codex:
        id: gpt-5.3-codex
