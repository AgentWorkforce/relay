version: '1.0'
name: pty-output-streaming
description: >
  PTY output streaming improvements for GitHub issue #390.

  The core worker_stream pipeline is ALREADY IMPLEMENTED end-to-end:
    Rust pty_worker → send_frame("worker_stream") → Broker → SDK event handler
    → onWorkerOutput + agent.onOutput()

  REMAINING GAP: PTY emits worker_stream on every read chunk with no batching.
  This workflow adds 100ms rate-limited buffering in Rust and optional stream
  filtering in the SDK's onOutput API.

  2 phases: parallel implementation → verification + fix.

swarm:
  pattern: dag
  maxConcurrency: 3
  timeoutMs: 3600000
  channel: wf-pty-streaming
  idleNudge:
    nudgeAfterMs: 300000
    escalateAfterMs: 300000
    maxNudges: 2

agents:
  - name: rust-dev
    cli: claude
    preset: worker
    role: 'Rust backend — adds rate-limited buffering to worker_stream emission in pty_worker.rs'
    constraints:
      model: sonnet

  - name: sdk-dev
    cli: claude
    preset: worker
    role: 'TypeScript SDK — adds stream filtering to agent.onOutput() and writes tests'
    constraints:
      model: sonnet

  - name: fixer
    cli: claude
    preset: worker
    role: 'Fixes type errors and test failures'
    constraints:
      model: sonnet

workflows:
  - name: default
    description: 'Add rate-limited buffering on Rust side and stream filtering on SDK side.'
    onError: retry

    preflight:
      - command: test -f src/pty_worker.rs
        description: 'Rust PTY worker source exists'
      - command: test -f packages/sdk/src/relay.ts
        description: 'SDK relay source exists'
      - command: grep -q worker_stream src/pty_worker.rs
        description: 'worker_stream emission already exists'
      - command: grep -q worker_stream packages/sdk/src/protocol.ts
        description: 'worker_stream protocol type already defined'

    steps:
      # ════════════════════════════════════════════════════════════════════════
      # PHASE 1: Context reads + parallel implementation
      # ════════════════════════════════════════════════════════════════════════

      - name: read-pty-worker
        type: deterministic
        command: |
          echo "=== worker_stream emission site ==="
          grep -n -B5 -A10 'worker_stream' src/pty_worker.rs
          echo ""
          echo "=== buffer declarations area (lines 220-260) ==="
          sed -n '220,260p' src/pty_worker.rs
          echo ""
          echo "=== verification_tick select arm ==="
          grep -n -B2 -A10 'verification_tick' src/pty_worker.rs
          echo ""
          echo "=== imports ==="
          head -30 src/pty_worker.rs
        captureOutput: true

      - name: read-sdk-relay
        type: deterministic
        command: |
          echo "=== onOutput method ==="
          grep -n -B5 -A20 'onOutput' packages/sdk/src/relay.ts
          echo ""
          echo "=== AgentOutputCallback type ==="
          grep -n -B2 -A5 'AgentOutputCallback' packages/sdk/src/relay.ts
          echo ""
          echo "=== Agent interface output section ==="
          grep -n -B2 -A5 'onOutput' packages/sdk/src/relay.ts | head -30
          echo ""
          echo "=== dispatchOutput ==="
          grep -n -B2 -A15 'dispatchOutput' packages/sdk/src/relay.ts
        captureOutput: true

      - name: read-existing-tests
        type: deterministic
        command: |
          echo "=== onOutput test patterns ==="
          grep -n -B2 -A15 'onOutput\|worker_stream' packages/sdk/src/__tests__/orchestration-upgrades.test.ts | head -60
        captureOutput: true

      # ── Wave 1: Rust buffering + SDK filtering (parallel) ──────────────────

      - name: rust-output-buffering
        agent: rust-dev
        dependsOn: [read-pty-worker]
        task: |
          Add 100ms rate-limited buffering to worker_stream emission in src/pty_worker.rs.

          CONTEXT:
          {{steps.read-pty-worker.output}}

          Changes:
          1. Add an output buffer (String) and last-flush Instant near existing buffer declarations
          2. Replace direct send_frame("worker_stream") with buffer accumulation
          3. Flush when: 100ms elapsed since last flush OR buffer exceeds 4096 bytes
          4. Add flush check on the verification_tick interval for quiet periods
          5. Keep the watchdog late-output emission as-is

          Constraints: anyhow::Result (no unwrap), tracing macros, no new crate deps,
          std::time::Instant (already imported), match existing code style.

          After implementing, run: cargo build 2>&1 | tail -10

          Write the file to disk.
        verification:
          type: exit_code
        retries: 2

      - name: sdk-stream-filtering
        agent: sdk-dev
        dependsOn: [read-sdk-relay, read-existing-tests]
        task: |
          Add optional stream-type filtering to agent.onOutput() in packages/sdk/src/relay.ts.

          CONTEXT:
          {{steps.read-sdk-relay.output}}

          EXISTING TEST PATTERNS:
          {{steps.read-existing-tests.output}}

          Changes:
          1. Update onOutput signature: onOutput(callback, options?: { stream?: string }): () => void
          2. When options.stream is provided, only invoke callback when event stream field matches
          3. Update Agent interface to include the options param
          4. Add tests in orchestration-upgrades.test.ts:
             - onOutput with { stream: 'stdout' } only receives stdout
             - onOutput without filter receives all streams
             - onOutput with { stream: 'stderr' } ignores stdout

          Keep backward compatibility — no options = receive all.

          After implementing, run: npx tsc --noEmit 2>&1 | tail -10

          Write all files to disk.
        verification:
          type: exit_code
        retries: 2

      # ════════════════════════════════════════════════════════════════════════
      # PHASE 2: Verification + fix
      # ════════════════════════════════════════════════════════════════════════

      - name: verify-files
        type: deterministic
        dependsOn: [rust-output-buffering, sdk-stream-filtering]
        command: |
          errors=0
          grep -q "output_buffer\|flush" src/pty_worker.rs || { echo "FAIL: pty_worker.rs missing buffering"; errors=$((errors+1)); }
          grep -q "stream.*filter\|options.*stream" packages/sdk/src/relay.ts || { echo "FAIL: relay.ts missing stream filtering"; errors=$((errors+1)); }
          [ $errors -gt 0 ] && exit 1
          echo "All implementation files verified"
        captureOutput: true
        failOnError: true

      - name: build-check
        type: deterministic
        dependsOn: [verify-files]
        command: |
          echo "=== Cargo build ==="
          cargo build 2>&1 | tail -10
          cargo_exit=$?
          echo ""
          echo "=== Clippy ==="
          cargo clippy -- -D warnings 2>&1 | tail -10
          clippy_exit=$?
          echo ""
          echo "=== TypeScript ==="
          cd packages/sdk && npx tsc --noEmit 2>&1 | tail -10
          tsc_exit=$?
          echo ""
          [ $cargo_exit -eq 0 ] && [ $clippy_exit -eq 0 ] && [ $tsc_exit -eq 0 ] && echo "BUILD_OK" || echo "BUILD_FAILED"
          [ $cargo_exit -eq 0 ] && [ $clippy_exit -eq 0 ] && [ $tsc_exit -eq 0 ]
        captureOutput: true
        failOnError: false

      - name: fix-failures
        agent: fixer
        dependsOn: [build-check]
        task: |
          Build results:
          {{steps.build-check.output}}

          If BUILD_OK, there's nothing to fix. Just confirm all clear.

          Otherwise, fix type errors, lint errors, or compilation failures in:
          - src/pty_worker.rs (Rust buffering)
          - packages/sdk/src/relay.ts (SDK filtering)
          - packages/sdk/src/__tests__/orchestration-upgrades.test.ts (tests)

          After fixing, re-run the failing commands to verify.
          Write files to disk.
        verification:
          type: exit_code
        retries: 2

      - name: final-tests
        type: deterministic
        dependsOn: [fix-failures]
        command: |
          set -o pipefail
          echo "=== Cargo test ==="
          cargo test 2>&1 | tail -20
          echo ""
          echo "=== SDK tests ==="
          cd packages/sdk && npx vitest run src/__tests__/orchestration-upgrades.test.ts 2>&1 | tail -20
        captureOutput: true
        failOnError: true

errorHandling:
  strategy: retry
  maxRetries: 2
  retryDelayMs: 5000
  notifyChannel: wf-pty-streaming
