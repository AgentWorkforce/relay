# Relay Workflow Feature Development Or Change With Documentation And Tests

## Action

Follow the feature-development-or-change-with-documentation-and-tests workflow:
1. Update implementation files in packages/cli and/or packages/sdk
2. Update or add corresponding test files in __tests__ directories
3. Update documentation files (e.g., web/content/docs/*.mdx)
