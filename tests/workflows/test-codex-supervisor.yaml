version: '1.0'
name: test-codex-supervisor

description: Real Codex supervisor workflow with two workers and a merge.

swarm:
  pattern: dag
  channel: test-codex-supervisor
  maxConcurrency: 3
  timeoutMs: 360000

agents:
  - name: codex-worker-a
    cli: codex
    preset: worker
  - name: codex-worker-b
    cli: codex
    preset: worker
  - name: codex-reviewer
    cli: codex
    preset: reviewer

workflows:
  - name: codex-supervisor
    steps:
      - name: worker-a
        type: agent
        agent: codex-worker-a
        task: |
          Output exactly:
          ITEM_A=red
          WORKER_A_DONE
        verification:
          type: output_contains
          value: WORKER_A_DONE

      - name: worker-b
        type: agent
        agent: codex-worker-b
        task: |
          Output exactly:
          ITEM_B=blue
          WORKER_B_DONE
        verification:
          type: output_contains
          value: WORKER_B_DONE

      - name: supervisor
        type: agent
        agent: codex-reviewer
        dependsOn: [worker-a, worker-b]
        task: |
          Review these worker outputs:

          A:
          {{steps.worker-a.output}}

          B:
          {{steps.worker-b.output}}

          If both outputs are present, output exactly:
          SUPERVISOR_OK
          ITEMS=2
        verification:
          type: output_contains
          value: SUPERVISOR_OK

      - name: merge
        type: deterministic
        dependsOn: [supervisor]
        command: |
          echo "{{steps.supervisor.output}}" | grep -q "SUPERVISOR_OK" && echo "MERGE_OK" || (echo "MERGE_FAIL" >&2; exit 1)
        captureOutput: true
        failOnError: true
