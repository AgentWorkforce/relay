version: '1.0'
name: test-codex-sequential

description: Minimal sequential Codex workflow with step output chaining.

swarm:
  pattern: pipeline
  channel: test-codex-seq
  timeoutMs: 240000

agents:
  - name: codex-a
    cli: codex
    preset: worker
  - name: codex-b
    cli: codex
    preset: worker

workflows:
  - name: codex-sequential
    steps:
      - name: first
        type: agent
        agent: codex-a
        task: |
          Output exactly:
          FIRST_OK
          VALUE=alpha
        verification:
          type: output_contains
          value: VALUE=alpha

      - name: second
        type: agent
        agent: codex-b
        dependsOn: [first]
        task: |
          Read this injected prior output and respond exactly:
          SEEN_PREVIOUS={{steps.first.output}}
          SECOND_OK
        verification:
          type: output_contains
          value: SECOND_OK
