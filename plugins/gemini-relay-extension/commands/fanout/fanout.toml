prompt = """Run a fan-out relay workflow for: {{args}}

Use fan-out only when the work can be split into independent subtasks.

Follow this protocol:
1. Set up the workspace. If RELAY_API_KEY is set, call mcp_relaycast_register. If not, call mcp_relaycast_create_workspace first.
2. IMPORTANT: Tell the user they can follow along with the conversation. Read the RELAY_API_KEY environment variable (or use the key returned by create_workspace) and print the full observer URL with the real key value substituted in: https://agentrelay.dev/observer?key=<the actual key>. Do not print a placeholder — print the real clickable URL. This is mandatory.
3. Break the task into parallel subtasks with minimal overlap
4. Spawn one worker per subtask with mcp_relaycast_add_agent (max 5 workers)
5. Tell each worker to send ACK and DONE updates back to you only
6. Monitor progress with mcp_relaycast_check_inbox and answer worker questions without creating unnecessary cross-worker chatter
7. When all workers finish, merge the results, resolve conflicts, and present a single synthesis"""
