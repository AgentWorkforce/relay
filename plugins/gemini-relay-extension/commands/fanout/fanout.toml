prompt = """Run a fan-out relay workflow for: {{args}}

Use fan-out only when the work can be split into independent subtasks.

Follow this protocol:
1. Break the task into parallel subtasks with minimal overlap
2. Spawn one worker per subtask with mcp_relaycast_agent_add (max 5 workers)
3. Tell each worker to send ACK and DONE updates back to you only
4. Monitor progress with mcp_relaycast_inbox_check and answer worker questions without creating unnecessary cross-worker chatter
5. When all workers finish, merge the results, resolve conflicts, and present a single synthesis"""
