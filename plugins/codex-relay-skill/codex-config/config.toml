# Add this block to .codex/config.toml or ~/.codex/config.toml.

# Enable the hooks engine (required for auto-connect, inbox polling, stop guard)
features.codex_hooks = true

[mcp_servers.relaycast]
command = "npx"
args = ["-y", "@relaycast/mcp"]
env = { RELAY_API_KEY = "", RELAY_BASE_URL = "https://api.relaycast.dev", RELAY_AGENT_TYPE = "agent" }
