name: Package Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENT_RELAY_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect web-only change set
    runs-on: ubuntu-latest
    outputs:
      web_only: ${{ steps.scope.outputs.web_only }}
    steps:
      - id: scope
        uses: actions/github-script@v7
        with:
          script: |
            let files = [];

            if (context.eventName === 'pull_request') {
              const changed = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = changed.map((file) => file.filename);
            } else {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: context.payload.before,
                head: context.sha,
              });
              files = (comparison.data.files || []).map((file) => file.filename);
            }

            const webOnly = files.length > 0 && files.every((file) => file.startsWith('web/'));
            core.info(`Changed files (${files.length}): ${files.join(', ')}`);
            core.setOutput('web_only', webOnly ? 'true' : 'false');

  validate:
    name: Build & Validate
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_FUND: false
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Cache node_modules - skip npm ci entirely if unchanged
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      # Cache turbo build outputs for incremental builds
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: turbo-

      - name: Build packages
        run: npm run build

      - name: Audit bundled dependencies
        run: |
          echo "=== Auditing bundled package dependencies ==="
          node scripts/audit-bundled-deps.mjs

      - name: Validate npm tarball artifact
        run: npm run pack:validate

      - name: Validate all
        run: |
          echo "=== Validating packages ==="
          ERRORS=0

          # Check dist files exist (skip non-Node package directories).
          # broker-* packages ship a Rust-built binary in bin/, not a JS
          # dist — they live under packages/ only for workspace linkage.
          SKIP_PACKAGES="build-plans brand broker-darwin-arm64 broker-darwin-x64 broker-linux-arm64 broker-linux-x64 broker-win32-x64"
          for pkg_dir in packages/*/; do
            pkg_name=$(basename "$pkg_dir")
            if [ ! -f "$pkg_dir/package.json" ]; then
              echo "⊘ $pkg_name - skipped (non-Node package)"
              continue
            fi
            if echo "$SKIP_PACKAGES" | grep -qw "$pkg_name"; then
              echo "⊘ $pkg_name - skipped (non-Node package)"
              continue
            fi
            if [ ! -f "$pkg_dir/dist/index.js" ] || [ ! -f "$pkg_dir/dist/index.d.ts" ]; then
              echo "✗ $pkg_name - missing dist files"
              ERRORS=$((ERRORS + 1))
            else
              echo "✓ $pkg_name"
            fi
          done

          [ $ERRORS -gt 0 ] && exit 1

          echo ""
          echo "=== Testing key imports ==="
          node --eval "
            const packages = [
              '@agent-relay/sdk',
              '@agent-relay/config',
              '@agent-relay/hooks',
              '@agent-relay/utils',
              '@agent-relay/user-directory',
            ];

            (async () => {
              let errors = 0;
              for (const pkg of packages) {
                try {
                  await import(pkg);
                  console.log('✓', pkg);
                } catch (e) {
                  console.error('✗', pkg, '-', e.message);
                  errors++;
                }
              }
              if (errors) process.exit(1);
            })();
          "

          echo ""
          echo "=== Testing main package ==="
          node --eval "
            import('./dist/src/index.js').then(m => {
              const required = ['AgentRelay', 'AgentRelayClient', 'createLogger'];
              const missing = required.filter(r => !(r in m));
              if (missing.length) {
                console.error('Missing exports:', missing);
                process.exit(1);
              }
              console.log('✓ Main package exports OK');
            });
          "

          echo ""
          echo "SUCCESS: All validations passed"

      - name: Test CLI startup
        run: |
          echo "=== Testing CLI broker lifecycle ==="
          TEST_PORT=3899
          API_PORT=$((TEST_PORT + 1))
          # Start broker+dashboard in background
          node dist/src/cli/index.js up --port "$TEST_PORT" &
          DAEMON_PID=$!

          # Wait for health endpoint (broker API is dashboard port + 1)
          for i in {1..20}; do
            if curl -sf "http://127.0.0.1:${API_PORT}/health" > /dev/null; then
              break
            fi
            sleep 1
          done

          # Verify broker is reachable
          if curl -sf "http://127.0.0.1:${API_PORT}/health" > /dev/null; then
            echo "✓ Broker health endpoint responding"
            AGENT_RELAY_SKIP_TMUX=1 node dist/src/cli/index.js status || true
          else
            echo "✗ Broker health endpoint did not become ready"
            exit 1
          fi

          # Cleanup through CLI down first, then hard-kill fallback
          node dist/src/cli/index.js down --force --timeout 5000 || true
          kill $DAEMON_PID 2>/dev/null || true

  publish-fresh-install-build:
    name: Publish Fresh Install Build
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_FUND: false
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'

      # The publish workflow bumps versions, removes package-lock.json, then
      # runs npm install. This catches range-resolved dependency breaks before merge.
      - name: Install dependencies with publish resolution
        run: |
          rm -rf node_modules packages/*/node_modules package-lock.json
          npm install

      - name: Show resolved trajectory dependency
        run: npm ls agent-trajectories --all

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Build full workspace
        run: npm run build

  standalone-macos-smoke:
    name: Standalone macOS Smoke
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: macos-latest
    env:
      NPM_CONFIG_FUND: false
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Build broker binary
        run: cargo build --release --bin agent-relay-broker

      - name: Verify broker binary
        run: |
          STANDALONE_BROKER="$PWD/target/release/agent-relay-broker"
          if [ ! -f "$STANDALONE_BROKER" ]; then
            echo "ERROR: Broker binary not found after build: $STANDALONE_BROKER" >&2
            echo "Contents of target/release:" >&2
            ls -la "$PWD/target/release" >&2 || true
            exit 1
          fi
          if [ ! -x "$STANDALONE_BROKER" ]; then
            echo "ERROR: Broker binary is not executable: $STANDALONE_BROKER" >&2
            ls -la "$STANDALONE_BROKER" >&2
            exit 1
          fi
          echo "STANDALONE_BROKER=$STANDALONE_BROKER" >> "$GITHUB_ENV"
          echo "Verified broker binary: $STANDALONE_BROKER"

      - name: Build standalone binary
        run: |
          mkdir -p release-binaries
          VERSION="$(node -p "require('./package.json').version")"
          ARCH="$(uname -m)"
          if [ "$ARCH" = "arm64" ]; then
            TARGET="bun-darwin-arm64"
            OUTPUT="agent-relay-darwin-arm64"
            EXPECTED_ARCH="arm64"
          elif [ "$ARCH" = "x86_64" ]; then
            TARGET="bun-darwin-x64"
            OUTPUT="agent-relay-darwin-x64"
            EXPECTED_ARCH="x86_64"
          else
            echo "Unsupported macOS runner architecture: $ARCH"
            exit 1
          fi
          bun build \
            --compile \
            --minify \
            --target="$TARGET" \
            --external=better-sqlite3 \
            --define="process.env.AGENT_RELAY_VERSION=\"${VERSION}\"" \
            ./dist/src/cli/index.js \
            --outfile "release-binaries/${OUTPUT}"
          if ! strings "release-binaries/${OUTPUT}" | grep -q 'ssh-userauth'; then
            echo "FATAL: ssh2 protocol symbols missing from release-binaries/${OUTPUT}"
            echo "cloud connect would hang; aborting validation."
            exit 1
          fi
          scripts/sign-macos-binary.sh "release-binaries/${OUTPUT}"
          scripts/verify-macos-binary.sh "release-binaries/${OUTPUT}" "$EXPECTED_ARCH" -- --version
          echo "STANDALONE_CLI=$PWD/release-binaries/${OUTPUT}" >> "$GITHUB_ENV"

      - name: Smoke standalone lifecycle
        env:
          AGENT_RELAY_STARTUP_DEBUG: 1
        run: bash scripts/ci-standalone-smoke.sh "$STANDALONE_CLI" "$STANDALONE_BROKER"
