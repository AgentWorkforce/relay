name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AGENT_RELAY_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect web-only change set
    runs-on: ubuntu-latest
    outputs:
      web_only: ${{ steps.scope.outputs.web_only }}
    steps:
      - id: scope
        uses: actions/github-script@v7
        with:
          script: |
            let files = [];

            if (context.eventName === 'pull_request') {
              const changed = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = changed.map((file) => file.filename);
            } else {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: context.payload.before,
                head: context.sha,
              });
              files = (comparison.data.files || []).map((file) => file.filename);
            }

            const webOnly = files.length > 0 && files.every((file) => file.startsWith('web/'));
            core.info(`Changed files (${files.length}): ${files.join(', ')}`);
            core.setOutput('web_only', webOnly ? 'true' : 'false');

  rust-test:
    name: Rust Tests (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  rust-cross-compile:
    name: Cross-compile check (${{ matrix.target }})
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            linker: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}
      - name: Cross-compile agent-relay-broker
        run: cargo check --target ${{ matrix.target }} --bin agent-relay-broker
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}

  rust-clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  rust-fmt:
    name: Format
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  sdk-check:
    name: SDK TypeScript Check
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm run -w @agent-relay/sdk check
