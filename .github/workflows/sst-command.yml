name: SST Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'SST command (e.g. refresh, remove, deploy, dev)'
        required: true
        type: choice
        options:
          - refresh
          - remove
          - deploy
      stage:
        description: 'Stage name (e.g. production, staging)'
        required: true
        type: string
        default: production
      region:
        description: AWS region
        required: true
        type: string
        default: us-east-1

concurrency:
  group: sst-web-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.region }}

      - name: Run sst ${{ inputs.command }} --stage ${{ inputs.stage }}
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ../node_modules/.bin/sst ${{ inputs.command }} --stage "${{ inputs.stage }}"
