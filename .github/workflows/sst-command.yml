name: SST Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'SST command (e.g. refresh, remove, deploy, dev)'
        required: true
        type: choice
        options:
          - refresh
          - remove
          - deploy
      stage:
        description: 'Stage name (e.g. production, preview, pr-123)'
        required: true
        type: string
        default: production

concurrency:
  group: sst-web-${{ inputs.stage }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    environment: ${{ (inputs.stage == 'production' || inputs.stage == 'prod') && 'prod' || 'preview' }}
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Normalize stage
        shell: bash
        run: |
          if [ "${{ inputs.stage }}" = "prod" ]; then
            echo "SST_STAGE=production" >> "$GITHUB_ENV"
          else
            echo "SST_STAGE=${{ inputs.stage }}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-sst-command-${{ github.run_id }}

      - name: Assert AWS account
        run: bash .github/scripts/assert-aws-account.sh "$AWS_ACCOUNT_ID" "$SST_STAGE" "${{ inputs.command }}"

      - name: Run sst ${{ inputs.command }} --stage ${{ env.SST_STAGE }}
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
        run: ../node_modules/.bin/sst ${{ inputs.command }} --stage "$SST_STAGE"
