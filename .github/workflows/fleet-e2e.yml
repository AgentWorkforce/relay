name: Fleet E2E

# Two-node fleet scenario matrix (RFC #1056, Phase 6). Boots a real relaycast
# engine + two `agent-relay fleet serve` nodes (each a Rust broker + TS sidecar)
# and drives the live control wire. Heavier than the unit suite (builds the Rust
# broker + the relaycast engine), so it runs on its own workflow, gated to fleet
# paths, and kept under the 10-minute budget via rust-cache.

on:
  push:
    branches: [main]
    paths:
      - 'packages/fleet/**'
      - 'packages/cli/**'
      - 'packages/harness-driver/**'
      - 'crates/broker/**'
      - 'tests/e2e/fleet/**'
      - 'vitest.e2e.config.ts'
      - '.github/workflows/fleet-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/fleet/**'
      - 'packages/cli/**'
      - 'packages/harness-driver/**'
      - 'crates/broker/**'
      - 'tests/e2e/fleet/**'
      - 'vitest.e2e.config.ts'
      - '.github/workflows/fleet-e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENT_RELAY_TELEMETRY_DISABLED: 1

jobs:
  fleet-e2e:
    name: Two-node fleet matrix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout relay
        uses: actions/checkout@v4

      # The relaycast engine lives in a separate repo; the fleet feature is on an
      # unreleased branch, so build it from source into a sibling directory.
      - name: Checkout relaycast engine
        uses: actions/checkout@v4
        with:
          repository: AgentWorkforce/relaycast
          ref: feat/fleet-mailbox
          path: relaycast-engine

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build relay (CLI + fleet + harness-driver)
        run: |
          npm ci
          npm run build:core

      - name: Build agent-relay-broker
        run: cargo build --release --bin agent-relay-broker

      - name: Build relaycast engine
        working-directory: relaycast-engine
        run: |
          npm ci
          npm run build --workspace @relaycast/types
          npm run build --workspace @relaycast/a2a
          npm run build --workspace @relaycast/engine

      - name: Run two-node fleet E2E
        env:
          RELAYCAST_ENGINE_DIR: ${{ github.workspace }}/relaycast-engine
          BROKER_BINARY_PATH: ${{ github.workspace }}/target/release/agent-relay-broker
        run: npm run test:e2e

      - name: Upload node logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fleet-e2e-logs
          path: /tmp/fleet-e2e-*/**/serve.log
          if-no-files-found: ignore
