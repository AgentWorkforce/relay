name: Deploy Web (SST)

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - packages/openclaw/skill/SKILL.md
      - .github/workflows/deploy-web.yml
  workflow_dispatch:
    inputs:
      region:
        description: AWS region
        required: true
        type: string
        default: us-east-1

concurrency:
  group: sst-web-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.region || 'us-east-1' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "Missing required secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_INPUT }}

      - name: Deploy SST app
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_DEFAULT_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ../node_modules/.bin/sst deploy --stage production
