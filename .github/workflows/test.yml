name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENT_RELAY_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      sdk_swift_only: ${{ steps.scope.outputs.sdk_swift_only }}
      sdk_swift_changed: ${{ steps.scope.outputs.sdk_swift_changed }}
    steps:
      - id: scope
        uses: actions/github-script@v7
        with:
          script: |
            let files = [];

            if (context.eventName === 'pull_request') {
              const changed = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = changed.map((file) => file.filename);
            } else {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: context.payload.before,
                head: context.sha,
              });
              files = (comparison.data.files || []).map((file) => file.filename);
            }

            const sdkSwiftOnly = files.length > 0 && files.every((file) => file.startsWith('packages/sdk-swift/'));
            const sdkSwiftChanged = files.some((file) => file.startsWith('packages/sdk-swift/'));
            core.info(`Changed files (${files.length}): ${files.join(', ')}`);
            core.setOutput('sdk_swift_only', sdkSwiftOnly ? 'true' : 'false');
            core.setOutput('sdk_swift_changed', sdkSwiftChanged ? 'true' : 'false');

  test:
    needs: changes
    if: needs.changes.outputs.sdk_swift_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ['20.x', '22.14.0']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Run tests
        run: npm test

  coverage:
    name: Coverage (upload)
    needs: changes
    if: needs.changes.outputs.sdk_swift_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info

  lint:
    needs: changes
    if: needs.changes.outputs.sdk_swift_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  swift-test:
    name: Swift SDK Tests
    needs: changes
    if: needs.changes.outputs.sdk_swift_changed == 'true'
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/sdk-swift
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
