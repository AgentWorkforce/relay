name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AGENT_RELAY_TELEMETRY_DISABLED: 1

jobs:
  changes:
    name: Detect web-only change set
    runs-on: ubuntu-latest
    outputs:
      web_only: ${{ steps.scope.outputs.web_only }}
    steps:
      - id: scope
        uses: actions/github-script@v7
        with:
          script: |
            let files = [];

            if (context.eventName === 'pull_request') {
              const changed = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = changed.map((file) => file.filename);
            } else {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: context.payload.before,
                head: context.sha,
              });
              files = (comparison.data.files || []).map((file) => file.filename);
            }

            const webOnly = files.length > 0 && files.every((file) => file.startsWith('web/'));
            core.info(`Changed files (${files.length}): ${files.join(', ')}`);
            core.setOutput('web_only', webOnly ? 'true' : 'false');

  test:
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ['20.x', '22.14.0']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Run tests
        run: npm test

  coverage:
    name: Coverage (upload)
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info

  lint:
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure rollup optional dependencies are installed
        run: npm install --no-save rollup || true

      - name: Lint
        run: npm run lint

  rust-test:
    name: Rust Tests (agent-relay-broker)
    needs: changes
    if: needs.changes.outputs.web_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --release

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy lints
        run: cargo clippy -- -D warnings
